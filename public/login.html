<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4efe6" />
    <title>ログイン・新規登録｜レポたすAI</title>
    <meta name="description" content="Pro 課金・アカウント管理のためのログイン" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body class="loginPage">
    <header class="loginTop">
      <a href="/app" class="loginBrandLink" id="backHome">
        <span class="loginLogoSm" aria-hidden="true">レ</span>
        <span class="loginBrandName">レポたすAI</span>
      </a>
      <div class="loginTopRight">
        <label class="loginLocalePicker" for="loginLocale">
          <span id="loginLocaleLabel" class="loginLocaleLabel">表示言語</span>
          <select id="loginLocale" class="loginLocaleSelect" autocomplete="off">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="vi">Tiếng Việt</option>
            <option value="ne">नेपाली</option>
            <option value="hi">हिन्दी</option>
            <option value="id">Bahasa Indonesia</option>
          </select>
        </label>
        <span id="loginPromoPill" class="loginPromoPill">メインはログイン不要でお試しOK</span>
      </div>
    </header>

    <main class="loginShell">
      <div class="loginCard">
        <div class="loginBrandBig">
          <div class="loginLogoLg" aria-hidden="true">レ</div>
          <p class="loginBrandTitle">レポたすAI</p>
        </div>

        <div class="authModeTabs" role="tablist" id="authModeTabs">
          <button type="button" id="tabSignin" class="authModeTab authModeTab--active" role="tab" aria-selected="true" aria-controls="authPanel">
            ログイン
          </button>
          <button type="button" id="tabSignup" class="authModeTab" role="tab" aria-selected="false" aria-controls="authPanel">
            新規登録
          </button>
        </div>

        <div id="authPanel" role="tabpanel" tabindex="0" aria-labelledby="tabSignin">
          <h1 class="loginHeading" id="modeHeading">ログイン</h1>
          <p id="modeHint" class="loginModeHint">すでに登録したメールとパスワードで入ります。</p>
          <p id="proIntentBanner" class="loginIntentBanner" hidden>Pro購入の続きです。ログイン後、そのまま決済ページへ進みます。</p>

        <button type="button" class="btnGoogle" id="googleBtn" aria-describedby="googleHint">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path
              fill="#FFC107"
              d="M43.611 20.083H42V20H24v8h11.303C33.72 32.657 29.592 36 24 36c-6.627 0-12-5.373-12-12 0-6.627 5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
            />
            <path
              fill="#FF3D00"
              d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
            />
            <path
              fill="#4CAF50"
              d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.86 11.86 0 0 1 24 36c-5.604 0-10.396-3.548-12.194-8.515l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
            />
            <path
              fill="#1976D2"
              d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
            />
          </svg>
          <span id="googleBtnLabel">Googleでログイン</span>
        </button>
        <p id="googleHint" class="loginGoogleHint">現在はメール・パスワードのみ対応しています。</p>

        <div class="loginOr" role="presentation">または</div>

        <div class="loginField">
          <label class="loginLabel" for="email" id="loginEmailLabel">メールアドレス</label>
          <input
            id="email"
            class="loginInput"
            type="email"
            inputmode="email"
            autocomplete="email"
            enterkeyhint="next"
            placeholder="a@sample.com"
          />
        </div>

        <div class="loginField">
          <label class="loginLabel" for="password" id="loginPasswordLabel">パスワード</label>
          <div class="loginPasswordRow">
            <input
              id="password"
              class="loginInput"
              type="password"
              autocomplete="current-password"
              enterkeyhint="done"
              placeholder="••••••••"
            />
            <button type="button" class="btnGhost" id="togglePw" aria-pressed="false">表示</button>
          </div>
        </div>

        <button type="button" class="btnSignIn" id="submitBtn">ログインする</button>

        <div class="loginSkip">
          <a href="/app" class="btnSkipLink" id="skipLoginLink">ログインせずに始める</a>
        </div>

        <div id="status" class="loginStatus" role="status" aria-live="polite"></div>

        <div class="loginLinks">
          <p id="forgotRow">
            <span id="forgotQuestion">パスワードをお忘れですか？</span>
            <a href="/contact.html" id="forgotLink">パスワードを忘れた方</a>
          </p>
          <p class="loginLinksHint" id="tabSwitchHint">
            <span id="switchPrompt"></span>
            <button type="button" class="linkLike" id="switchMode"></button>
          </p>
          <p class="loginHintSmall" id="loginNavHint"></p>
        </div>
        </div>
      </div>
    </main>

    <footer class="loginFoot">
      <nav class="loginFootInner" aria-label="フッター">
        <a href="/terms.html">利用規約</a>
        <a href="/privacy.html">プライバシーポリシー</a>
        <a href="/tokusho.html">特定商取引法に基づく表記</a>
        <a href="/contact.html">お問い合わせ</a>
      </nav>
    </footer>

    <script src="/login.js" type="module"></script>
  </body>
</html>
